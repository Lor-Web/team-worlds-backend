name: Deploy backend to production

on:
  push:
    branches:
      - main

concurrency:
  group: production-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /var/www/team-worlds/backend
            git fetch origin main
            git reset --hard origin/main
            npm ci
            npm run build
            npm run db:migrate:deploy
            sudo systemctl restart team-worlds-backend

            for attempt in 1 2 3 4 5; do
              sleep 2
              if curl -fsS http://127.0.0.1:3000/health; then
                echo
                exit 0
              fi
            done

            echo "Health check failed after restart"
            sudo systemctl status team-worlds-backend --no-pager || true
            sudo journalctl -u team-worlds-backend -n 40 --no-pager || true
            exit 1
