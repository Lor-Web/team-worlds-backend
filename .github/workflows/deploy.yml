name: Deploy backend to production

on:
  push:
    branches:
      - main

concurrency:
  group: production-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Create deployment archive
        run: tar czf deploy.tar.gz dist package.json package-lock.json prisma

      - name: Upload build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: deploy.tar.gz
          target: /var/www/team-worlds/backend

      - name: Install and restart on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /var/www/team-worlds/backend
            tar xzf deploy.tar.gz
            rm -f deploy.tar.gz
            npm ci --omit=dev
            npx prisma generate
            npm run db:migrate:deploy
            sudo systemctl restart team-worlds-backend

            for attempt in 1 2 3 4 5; do
              sleep 2
              if curl -fsS http://127.0.0.1:3000/health; then
                echo
                exit 0
              fi
            done

            echo "Health check failed after restart"
            sudo systemctl status team-worlds-backend --no-pager || true
            sudo journalctl -u team-worlds-backend -n 40 --no-pager || true
            exit 1
