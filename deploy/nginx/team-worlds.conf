# Upstream API (Node.js)
upstream team_worlds_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Фронт: https://team-worlds.ru
server {
    listen 80;
    listen [::]:80;
    server_name team-worlds.ru www.team-worlds.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://team-worlds.ru$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name team-worlds.ru www.team-worlds.ru;

    ssl_certificate     /etc/letsencrypt/live/team-worlds.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/team-worlds.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/team-worlds/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Бэкенд: https://api.team-worlds.ru
server {
    listen 80;
    listen [::]:80;
    server_name api.team-worlds.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://api.team-worlds.ru$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.team-worlds.ru;

    ssl_certificate     /etc/letsencrypt/live/api.team-worlds.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.team-worlds.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_pass http://team_worlds_api;
    }
}
