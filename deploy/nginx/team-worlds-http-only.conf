# Временный конфиг до готовности DNS и SSL.
# API доступен по http://IP/health через nginx.
# После certbot замените на deploy/nginx/team-worlds.conf

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

upstream team_worlds_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/team-worlds/frontend;
    index index.html;

    location /health {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_pass http://team_worlds_api;
    }

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_pass http://team_worlds_api;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
